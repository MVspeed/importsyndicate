<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <meta property="og:title" content="Import Syndicate — Оптовые поставки редких напитков">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://wsrv.nl">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0a0c;
      --bg-card:#131316;
      --bg-input:#1a1a1f;
      --text:#f5f5f7;
      --text-secondary:#8a8a93;
      --accent:#39ff14;
      --accent-dim:rgba(57,255,20,0.15);
      --accent-glow:rgba(57,255,20,0.4);
      --border:rgba(255,255,255,0.06);
      --gold:#ffd700;
      --blue:#3b82f6;
      --purple:#a855f7;
      --radius:16px;
      --radius-sm:10px;
      --transition:0.3s cubic-bezier(0.4,0,0.2,1);
      --max-width:1200px;
      --header-height:72px
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Montserrat',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;margin-top:var(--header-height)}
    ::selection{background:var(--accent);color:#000}
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    /* === ШАПКА === */
    .header{position:fixed;top:0;left:0;right:0;height:var(--header-height);background:rgba(10,10,12,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:1000;display:flex;align-items:center;justify-content:flex-start;padding:0 32px;gap:48px;transition:var(--transition)}
    .header.scrolled{background:rgba(10,10,12,0.96);box-shadow:0 4px 30px rgba(0,0,0,0.4)}
    .logo{font-size:1.4rem;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;cursor:pointer}
    .nav{display:flex;gap:32px;align-items:center;flex:1}
    .nav a,.nav span{font-size:0.9rem;font-weight:500;color:var(--text-secondary);transition:var(--transition);position:relative;white-space:nowrap;cursor:pointer}
    .nav a:hover,.nav span:hover{color:var(--text)}
    .nav a::after,.nav span::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--accent);transition:var(--transition);border-radius:2px}
    .nav a:hover::after,.nav span:hover::after{width:100%}
    .header-actions{display:flex;align-items:center;gap:16px;margin-left:auto}
    .mobile-menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}

    /* === КНОПКИ === */
    .btn{padding:16px 36px;border-radius:var(--radius-sm);font-size:1rem;font-weight:700;cursor:pointer;transition:var(--transition);border:none;display:inline-flex;align-items:center;gap:8px;justify-content:center}
    .btn-primary{background:var(--accent);color:#000;box-shadow:0 4px 30px rgba(57,255,20,0.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(57,255,20,0.5)}
    .btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{border-color:var(--text-secondary);background:rgba(255,255,255,0.03)}
    .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
    .btn-outline:hover{background:var(--accent);color:#000}
    .btn-large{padding:20px 48px;font-size:1.1rem}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}

    /* === СЕКЦИИ === */
    .section{padding:100px 24px;max-width:var(--max-width);margin:0 auto}
    .section-header{text-align:center;margin-bottom:64px}
    .section-header h2{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;margin-bottom:12px;letter-spacing:-1px}
    .section-header p{color:var(--text-secondary);font-size:1.1rem;max-width:560px;margin:0 auto}

    /* === HERO === */
    .hero{min-height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:calc(var(--header-height)+60px) 24px 80px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);opacity:0.3;pointer-events:none;animation:pulse 4s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:0.3}50%{transform:translateX(-50%) scale(1.1);opacity:0.5}}
    .hero-content{position:relative;z-index:2;max-width:760px}
    .hero-badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
    .badge{background:var(--accent-dim);color:var(--accent);padding:6px 14px;border-radius:100px;font-size:0.75rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;border:1px solid rgba(57,255,20,0.2)}
    .hero h1{font-size:clamp(2.4rem,5.5vw,4.2rem);font-weight:900;line-height:1.15;letter-spacing:-2px;margin-bottom:20px}
    .hero h1 span{background:linear-gradient(135deg,var(--accent) 0%,#2ecc71 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero p{font-size:clamp(1rem,2vw,1.2rem);color:var(--text-secondary);max-width:620px;margin:0 auto 40px}
    .hero-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}

    /* === ПРЕИМУЩЕСТВА === */
    .why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:24px}
    .why-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:36px 28px;text-align:center;transition:var(--transition)}
    .why-card:hover{border-color:rgba(57,255,20,0.2);transform:translateY(-4px)}
    .why-icon{width:56px;height:56px;background:var(--accent-dim);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.5rem}
    .why-card h3{font-size:1.1rem;font-weight:700;margin-bottom:10px}
    .why-card p{color:var(--text-secondary);font-size:0.9rem;line-height:1.5}

    /* === ПРОДУКТЫ === */
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
    .product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition);cursor:pointer}
    .product-card:hover{transform:translateY(-4px);border-color:rgba(57,255,20,0.2)}
    .product-img{aspect-ratio:1;background:linear-gradient(135deg,#1a1a1f 0%,#0f0f12 100%);display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative}
    .product-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .product-img .img-fallback{position:relative;z-index:2}
    .product-tag{position:absolute;top:12px;left:12px;padding:3px 10px;border-radius:6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;z-index:3}
    .tag-green{background:rgba(57,255,20,0.15);color:var(--accent)}
    .tag-blue{background:rgba(59,130,246,0.15);color:var(--blue)}
    .tag-gold{background:rgba(255,215,0,0.15);color:var(--gold)}
    .tag-purple{background:rgba(168,85,247,0.15);color:var(--purple)}
    .product-info{padding:20px}
    .product-name{font-size:0.95rem;font-weight:700;margin-bottom:6px;line-height:1.3}
    .product-short{color:var(--text-secondary);font-size:0.85rem;margin-bottom:14px}
    .btn-details{width:100%;padding:10px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(57,255,20,0.2);border-radius:var(--radius-sm);font-size:0.85rem;font-weight:700;cursor:pointer;transition:var(--transition);text-align:center}
    .btn-details:hover{background:var(--accent);color:#000}

    /* === КАК ЭТО РАБОТАЕТ === */
    .steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:32px}
    .step-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px;position:relative;transition:var(--transition)}
    .step-card:hover{border-color:rgba(57,255,20,0.2)}
    .step-num{font-size:3rem;font-weight:900;color:var(--accent);opacity:0.3;line-height:1;margin-bottom:16px}
    .step-card h3{font-size:1.2rem;font-weight:700;margin-bottom:10px}
    .step-card p{color:var(--text-secondary);font-size:0.95rem;line-height:1.6}

    /* === FAQ === */
    .faq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px}
    .faq-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;transition:var(--transition);cursor:pointer}
    .faq-item:hover{border-color:rgba(57,255,20,0.2)}
    .faq-item.active{border-color:var(--accent)}
    .faq-question{font-size:1.05rem;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .faq-question::after{content:'+';font-size:1.2rem;color:var(--accent);flex-shrink:0;transition:var(--transition)}
    .faq-item.active .faq-question::after{content:'−'}
    .faq-answer{color:var(--text-secondary);font-size:0.95rem;line-height:1.7;max-height:0;overflow:hidden;transition:max-height 0.3s ease,padding 0.3s ease}
    .faq-item.active .faq-answer{max-height:300px;padding-top:12px}

    /* === CTA БЛОК === */
    .cta-block{background:linear-gradient(180deg,var(--bg) 0%,rgba(57,255,20,0.03) 50%,var(--bg) 100%);text-align:center;padding:120px 24px}
    .cta-block h2{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;max-width:640px;margin:0 auto 16px;line-height:1.3}
    .cta-block p{color:var(--text-secondary);font-size:1.1rem;max-width:520px;margin:0 auto 36px}

    /* === ФУТЕР === */
    .footer{border-top:1px solid var(--border);padding:60px 24px 30px;max-width:var(--max-width);margin:0 auto}
    .footer-grid{display:grid;grid-template-columns:2fr 1fr;gap:48px;margin-bottom:48px}
    .footer-brand .logo{margin-bottom:12px;display:inline-block}
    .footer-brand p{color:var(--text-secondary);font-size:0.9rem}
    .footer-col h4{font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;color:var(--text-secondary)}
    .footer-col a{display:block;color:var(--text-secondary);font-size:0.9rem;margin-bottom:12px;transition:var(--transition)}
    .footer-col a:hover{color:var(--accent)}
    .footer-bottom{border-top:1px solid var(--border);padding-top:24px;text-align:center;color:var(--text-secondary);font-size:0.8rem}


    /* === МОБИЛЬНОЕ МЕНЮ === */
    .mobile-nav{display:flex;flex-direction:column;position:fixed;top:var(--header-height);left:0;right:0;background:var(--bg);border-bottom:1px solid var(--border);z-index:999;max-height:0;overflow:hidden;opacity:0;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.25s ease,padding 0.3s ease;padding:0 24px}
    .mobile-nav.active{max-height:400px;opacity:1;padding:8px 24px 16px}
    .mobile-nav span{padding:14px 0;color:var(--text-secondary);font-weight:500;border-bottom:1px solid var(--border);cursor:pointer;transition:color 0.2s,transform 0.3s ease,opacity 0.3s ease;transform:translateY(-8px);opacity:0}
    .mobile-nav.active span{transform:translateY(0);opacity:1}
    .mobile-nav.active span:nth-child(1){transition-delay:0.05s}
    .mobile-nav.active span:nth-child(2){transition-delay:0.10s}
    .mobile-nav.active span:nth-child(3){transition-delay:0.15s}
    .mobile-nav.active span:nth-child(4){transition-delay:0.20s}
    .mobile-nav.active span:nth-child(5){transition-delay:0.25s}
    .mobile-nav span:hover{color:var(--accent)}
    .mobile-nav span:last-child{border-bottom:none}
    /* === ХЛЕБНЫЕ КРОШКИ === */
    .breadcrumbs{max-width:var(--max-width);margin:0 auto;padding:24px 24px 0;display:flex;gap:8px;align-items:center;font-size:0.85rem;color:var(--text-secondary)}
    .breadcrumbs span:hover{color:var(--accent);cursor:pointer}
    .breadcrumbs .current{color:var(--text);cursor:default}

    /* === СТРАНИЦА ТОВАРА === */
    .product-page{max-width:var(--max-width);margin:0 auto;padding:40px 24px 100px}
    .product-layout{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
    .product-main-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#1a1a1f 0%,#0f0f12 100%);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);position:relative;overflow:hidden}
    .product-main-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .product-main-img .img-fallback{position:relative;z-index:2;font-size:6rem}
    .product-main-img::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,var(--accent-glow) 0%,transparent 50%);opacity:0.2;z-index:1}
    .product-info-page h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;margin-bottom:16px;line-height:1.2;letter-spacing:-1px}
    .product-tag-page{display:inline-block;padding:4px 14px;border-radius:100px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:20px}
    .product-desc-page{color:var(--text-secondary);font-size:1.05rem;line-height:1.7;margin-bottom:32px}
    .product-actions{display:flex;gap:12px;margin-bottom:32px}
    .product-actions .btn{flex:1;padding:18px 24px;font-size:1.05rem}
    .product-details,.product-features,.product-comp{margin-bottom:32px}
    .product-details h3,.product-features h3,.product-comp h3{font-size:1.1rem;font-weight:700;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary)}
    .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:0.95rem}
    .detail-row span:first-child{color:var(--text-secondary)}
    .detail-row span:last-child{font-weight:600;text-align:right}
    .feature-list{list-style:none}
    .feature-list li{padding:8px 0;display:flex;align-items:flex-start;gap:12px;font-size:0.95rem;color:var(--text-secondary)}
    .feature-list li::before{content:'✓';color:var(--accent);font-weight:800;flex-shrink:0}
    .comp-text{color:var(--text-secondary);font-size:0.9rem;line-height:1.7;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}

    /* === ПОХОЖИЕ ТОВАРЫ === */
    .related-section{max-width:var(--max-width);margin:0 auto;padding:0 24px 100px}
    .related-section h2{font-size:1.5rem;font-weight:800;margin-bottom:32px}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}

    /* === ФОРМА ЗАЯВКИ === */
    .form-page{max-width:700px;margin:0 auto;padding:40px 24px 100px}
    .form-header{text-align:center;margin-bottom:48px}
    .form-header h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:800;margin-bottom:12px}
    .form-header p{color:var(--text-secondary);font-size:1.05rem}
    .order-form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:8px}
    .form-group label .required{color:var(--accent);margin-left:2px}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:14px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:1rem;font-family:inherit;transition:var(--transition)}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
    .form-group input::placeholder,.form-group textarea::placeholder{color:var(--text-secondary);opacity:0.5}
    .form-group textarea{min-height:110px;resize:vertical}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .checkbox-row{display:flex;flex-wrap:wrap;gap:10px}
    .checkbox-pill{display:flex;align-items:center;gap:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:100px;padding:10px 16px;font-size:0.85rem;cursor:pointer;transition:var(--transition)}
    .checkbox-pill:hover{border-color:var(--accent)}
    .checkbox-pill input{width:auto;accent-color:var(--accent)}
    .form-submit{width:100%;margin-top:12px}
    .form-privacy{margin-top:16px;font-size:0.8rem;color:var(--text-secondary);text-align:center;line-height:1.5}

    /* === УСПЕШНАЯ ЗАЯВКА === */
    .success-page{min-height:70vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 24px 80px;max-width:600px;margin:0 auto}
    .success-icon{width:80px;height:80px;background:var(--accent-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin-bottom:24px;border:2px solid var(--accent);box-shadow:0 0 30px var(--accent-glow)}
    .success-page h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;margin-bottom:16px}
    .success-page p{color:var(--text-secondary);font-size:1.05rem;margin-bottom:32px;line-height:1.6}

    /* === АДАПТИВ === */
    @media(max-width:900px){
      .product-layout{grid-template-columns:1fr}
      .faq-grid{grid-template-columns:1fr}
    }
    @media(max-width:768px){
      .nav{display:none}
      .mobile-menu-btn{display:block}
      .header{padding:0 16px;gap:16px}
      .footer-grid{grid-template-columns:1fr;gap:32px}
      .hero{padding-top:calc(var(--header-height)+40px)}
      .section{padding:60px 20px}
      .product-actions{flex-direction:column}
      .form-row{grid-template-columns:1fr}
      .related-grid{grid-template-columns:1fr}
    }

    /* === АНИМАЦИИ === */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{opacity:0;animation:fadeInUp 0.6s ease forwards}
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <header class="header" id="header">
    <span class="logo" onclick="router.navigate('')">Import Syndicate</span>
    <nav class="nav" id="mainNav"></nav>
    <div class="header-actions">
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </header>

  <!-- МОБИЛЬНОЕ МЕНЮ -->
  <nav class="mobile-nav" id="mobileNav"></nav>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <main id="app"></main>

  <!-- СКРИПТЫ -->
  <script src="content.js"></script>
  <script>

    // ============================================
    // УТИЛИТЫ
    // ============================================
    const imgPath = name => name ? SITE.imagesPath + name : null;

    // ============================================
    // ОПТИМИЗАЦИЯ ИЗОБРАЖЕНИЙ
    // ============================================
    // Оригинальные картинки часто весят по несколько мегабайт (фото "как есть"),
    // из-за этого сайт грузится медленно, а на медленном интернете загрузка
    // может вообще не успевать завершиться (картинка "не грузится").
    //
    // Чтобы не трогать сами файлы, изображения прогоняются через бесплатный
    // CDN-прокси wsrv.nl: он сам скачивает оригинал с сайта, один раз сжимает,
    // конвертирует в современный формат WebP и дальше отдаёт уже готовую,
    // лёгкую версию из кэша — без потери видимого качества.
    // Если прокси недоступен — картинка автоматически подгрузится напрямую
    // с сайта, а если и это не получится — покажется эмодзи-заглушка.
    function optimizedSrc(originalSrc, width) {
      const absoluteUrl = new URL(originalSrc, window.location.href).href;
      return `https://wsrv.nl/?url=${encodeURIComponent(absoluteUrl)}&w=${width}&output=webp&q=82&af`;
    }

    function imgHTML(src, fallback, { width = 480, priority = false } = {}) {
      if (!src) return `<span class="img-fallback">${fallback}</span>`;
      const small = optimizedSrc(src, width);
      const large = optimizedSrc(src, width * 2);
      const loadingAttr = priority ? `loading="eager" fetchpriority="high"` : `loading="lazy"`;
      return `<img
          src="${small}"
          srcset="${small} 1x, ${large} 2x"
          alt=""
          ${loadingAttr}
          decoding="async"
          width="${width}" height="${width}"
          data-orig="${src}"
          onerror="if(!this.dataset.fallbackStage){this.dataset.fallbackStage='orig';this.removeAttribute('srcset');this.src=this.dataset.orig;}else{this.style.display='none';this.parentElement.querySelector('.img-fallback').style.display='flex';}"
        >` +
        `<span class="img-fallback" style="display:none">${fallback}</span>`;
    }

    // ============================================
    // МОБИЛЬНОЕ МЕНЮ
    // ============================================
    function toggleMobileMenu() {
      const nav = document.getElementById("mobileNav");
      const btn = document.getElementById("mobileMenuBtn");
      const isOpen = nav.classList.toggle("active");
      btn.textContent = isOpen ? "✕" : "☰";
    }

    // ============================================
    // РОУТЕР
    // ============================================
    const router = {
      navigate(path) {
        window.location.hash = path;
      },
      parse() {
        const hash = window.location.hash.replace("#", "").replace(/^\//, "");
        const [page, ...rest] = hash.split("/");
        return { page, params: rest };
      },
      render() {
        const { page, params } = this.parse();
        const app = document.getElementById("app");
        window.scrollTo({ top: 0, left: 0, behavior: "smooth" });
        document.getElementById("mobileNav").classList.remove("active"); document.getElementById("mobileMenuBtn").textContent = "☰";

        if (!page || page === "") {
          app.innerHTML = renderHome();
          initHome();
        } else if (page === "product" && params[0]) {
          const p = SITE.products.find(x => x.id === params[0]);
          if (p) { app.innerHTML = renderProductPage(p); initScrollEffects(); }
          else router.navigate("");
        } else if (page === "order") {
          app.innerHTML = renderOrderForm();
          initOrderForm();
        } else if (page === "success") {
          app.innerHTML = renderSuccess();
        } else {
          router.navigate("");
        }
      }
    };

    // ============================================
    // ГЛАВНАЯ СТРАНИЦА
    // ============================================
    function renderHome() {
      return `
        <section class="hero">
          <div class="hero-content">
            <div class="hero-badges">${SITE.hero.badges.map(b => `<span class="badge">${b}</span>`).join("")}</div>
            <h1>${SITE.hero.headline.replace("Европы и США", "<span>Европы и США</span>")}</h1>
            <p>${SITE.hero.subheadline}</p>
            <div class="hero-buttons">
              <span class="btn btn-primary" onclick="router.navigate('order')">Оставить заявку →</span>
              <span class="btn btn-secondary" onclick="scrollToSection('products')">Смотреть каталог</span>
            </div>
          </div>
        </section>

        <section class="section" id="why-us">
          <div class="section-header">
            <h2>Почему работают с нами</h2>
          </div>
          <div class="why-grid" id="whyGrid"></div>
        </section>

        <section class="section" id="products">
          <div class="section-header">
            <h2>Каталог</h2>
            <p>Позиции, доступные для оптовых поставок</p>
          </div>
          <div class="products-grid" id="productsGrid"></div>
        </section>

        <section class="section" id="how-it-works">
          <div class="section-header">
            <h2>Как мы работаем</h2>
          </div>
          <div class="steps-grid" id="stepsGrid"></div>
        </section>

        <section class="section" id="faq">
          <div class="section-header">
            <h2>Частые вопросы</h2>
            <p>Всё, что нужно знать перед заявкой</p>
          </div>
          <div class="faq-grid" id="faqGrid"></div>
        </section>

        <section class="cta-block">
          <h2>Готовы обсудить условия поставки?</h2>
          <p>Оставьте заявку — менеджер свяжется с вами и подготовит коммерческое предложение</p>
          <span class="btn btn-primary" onclick="router.navigate('order')">Оставить заявку →</span>
        </section>

        ${renderFooter()}
      `;
    }

    function initHome() {
      document.getElementById("whyGrid").innerHTML = SITE.whyUs.map(w =>
        `<div class="why-card"><div class="why-icon">${w.icon}</div><h3>${w.title}</h3><p>${w.desc}</p></div>`
      ).join("");

      document.getElementById("productsGrid").innerHTML = SITE.products.map((p, i) =>
        `<article class="product-card" onclick="router.navigate('product/${p.id}')">
          <div class="product-img">${imgHTML(imgPath(p.image), p.emoji, { width: 400, priority: i < 4 })}<span class="product-tag ${p.tagClass}">${p.tag}</span></div>
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-short">${p.shortDesc}</p>
            <span class="btn-details">Подробнее →</span>
          </div>
        </article>`
      ).join("");

      document.getElementById("stepsGrid").innerHTML = SITE.steps.map(s =>
        `<div class="step-card"><div class="step-num">${s.num}</div><h3>${s.title}</h3><p>${s.desc}</p></div>`
      ).join("");

      document.getElementById("faqGrid").innerHTML = SITE.faq.map((f, i) =>
        `<div class="faq-item" onclick="toggleFaq(${i})">
          <div class="faq-question">${f.question}</div>
          <div class="faq-answer" id="faq-answer-${i}">${f.answer}</div>
        </div>`
      ).join("");

      initScrollEffects();
    }

    // ============================================
    // FAQ
    // ============================================
    function toggleFaq(i) {
      const items = document.querySelectorAll('.faq-item');
      items.forEach((item, idx) => {
        if (idx === i) item.classList.toggle('active');
        else item.classList.remove('active');
      });
    }

    // ============================================
    // ПРОКРУТКА К СЕКЦИИ
    // ============================================
    function scrollToSection(id) {
      if (window.location.hash && window.location.hash !== "#") {
        router.navigate("");
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({ behavior: "smooth" });
        }, 100);
      } else {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth" });
      }
    }

    // ============================================
    // СТРАНИЦА ТОВАРА
    // ============================================
    function renderProductPage(p) {
      const related = SITE.products.filter(x => x.id !== p.id);

      return `
        <div class="breadcrumbs">
          <span onclick="router.navigate('')">Главная</span><span>/</span>
          <span onclick="scrollToSection('products')">Каталог</span><span>/</span>
          <span class="current">${p.name}</span>
        </div>
        <main class="product-page">
          <div class="product-layout">
            <div class="product-main-img">${imgHTML(imgPath(p.image), p.emoji, { width: 700, priority: true })}</div>
            <div class="product-info-page">
              <span class="product-tag-page ${p.tagClass}">${p.tag}</span>
              <h1>${p.name}</h1>
              <p class="product-desc-page">${p.fullDesc}</p>
              <div class="product-actions">
                <span class="btn btn-primary btn-large" onclick="router.navigate('order')">Оставить заявку на поставку</span>
              </div>
              <div class="product-details">
                <h3>Характеристики</h3>
                ${p.details.map(d => `<div class="detail-row"><span>${d.label}</span><span>${d.value}</span></div>`).join("")}
              </div>
              <div class="product-features">
                <h3>Особенности</h3>
                <ul class="feature-list">${p.features.map(f => `<li>${f}</li>`).join("")}</ul>
              </div>
              <div class="product-comp">
                <h3>Состав</h3>
                <p class="comp-text">${p.composition}</p>
              </div>
            </div>
          </div>
        </main>
        <section class="related-section">
          <h2>Другие позиции каталога</h2>
          <div class="related-grid">
            ${related.map(r => `
              <article class="product-card" onclick="router.navigate('product/${r.id}')">
                <div class="product-img">${imgHTML(imgPath(r.image), r.emoji, { width: 400 })}<span class="product-tag ${r.tagClass}">${r.tag}</span></div>
                <div class="product-info">
                  <h3 class="product-name">${r.name}</h3>
                  <p class="product-short">${r.shortDesc}</p>
                  <span class="btn-details">Подробнее →</span>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
        ${renderFooter()}
      `;
    }

    // ============================================
    // ФОРМА ЗАЯВКИ (Formspree)
    // ============================================
    function renderOrderForm() {
      const f = SITE.form;
      return `
        <div class="form-page">
          <div class="form-header">
            <h1>${f.title}</h1>
            <p>${f.subtitle}</p>
          </div>
          <form class="order-form" id="orderForm" action="https://formspree.io/f/${SITE.formspreeId}" method="POST">
            <input type="hidden" name="_subject" value="Новая заявка на оптовую поставку — Import Syndicate">

            <div class="form-row">
              <div class="form-group">
                <label>Имя <span class="required">*</span></label>
                <input type="text" name="name" placeholder="Иван Иванов" required>
              </div>
              <div class="form-group">
                <label>Компания</label>
                <input type="text" name="company" placeholder="ООО «Пример»">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Телефон <span class="required">*</span></label>
                <input type="tel" name="phone" placeholder="+7 (999) 000-00-00" required>
              </div>
              <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" placeholder="ivan@company.ru" required>
              </div>
            </div>

            <div class="form-group">
              <label>Интересующие позиции</label>
              <div class="checkbox-row">
                ${SITE.products.map(p => `
                  <label class="checkbox-pill">
                    <input type="checkbox" name="products" value="${p.name}">
                    ${p.name}
                  </label>
                `).join("")}
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Примерный объём</label>
                <input type="text" name="volume" placeholder="например, 1 паллета / 500 кейсов / в месяц">
              </div>
              <div class="form-group">
                <label>Город / регион</label>
                <input type="text" name="region" placeholder="Москва">
              </div>
            </div>

            <div class="form-group">
              <label>Комментарий</label>
              <textarea name="comment" placeholder="Дополнительная информация о запросе"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-large form-submit" id="submitBtn">${f.submitBtn}</button>
            <p class="form-privacy">${f.privacyNote}</p>
          </form>
        </div>
      `;
    }

    function initOrderForm() {
      const form = document.getElementById("orderForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "Отправка...";
        try {
          const res = await fetch(form.action, { method: "POST", body: new FormData(form), headers: { Accept: "application/json" } });
          if (res.ok) {
            router.navigate("success");
          } else {
            alert("Ошибка отправки. Попробуйте ещё раз.");
            btn.disabled = false;
            btn.textContent = SITE.form.submitBtn;
          }
        } catch (err) {
          alert("Ошибка сети. Проверьте интернет.");
          btn.disabled = false;
          btn.textContent = SITE.form.submitBtn;
        }
      });
    }

    // ============================================
    // УСПЕШНАЯ ЗАЯВКА
    // ============================================
    function renderSuccess() {
      const f = SITE.form;
      return `
        <div class="success-page">
          <div class="success-icon">✓</div>
          <h1>${f.successTitle}</h1>
          <p>${f.successSubtitle}</p>
          <span class="btn btn-primary" onclick="router.navigate('')">${f.successCta}</span>
        </div>
      `;
    }

    // ============================================
    // ФУТЕР
    // ============================================
    function renderFooter() {
      return `
        <footer class="footer" id="footer">
          <div class="footer-grid">
            <div class="footer-brand">
              <span class="logo">${SITE.brand}</span>
              <p>${SITE.tagline} с ${SITE.year.split("–")[0]} года. Прямой импорт, оптовые поставки по всей России.</p>
            </div>
            <div class="footer-col">
              <h4>Контакты</h4>
              <a href="${SITE.telegram}" target="_blank">Telegram: @importsyndicate</a>
              <a href="mailto:${SITE.sellerEmail}">${SITE.sellerEmail}</a>
            </div>
          </div>
          <div class="footer-bottom">© ${SITE.year} ${SITE.brand}. Все права защищены.</div>
        </footer>
      `;
    }

    // ============================================
    // НАВИГАЦИЯ
    // ============================================
    function renderNav() {
      const html = SITE.nav.map(n => `<span onclick="scrollToSection('${n.href.replace("#", "")}')">${n.text}</span>`).join("")
        + `<span onclick="router.navigate('order')">Заявка</span>`;
      document.getElementById("mainNav").innerHTML = html;
      document.getElementById("mobileNav").innerHTML = html;
    }

    // ============================================
    // ЭФФЕКТЫ ПРИ СКРОЛЛЕ
    // ============================================
    function initScrollEffects() {
      const header = document.getElementById("header");
      const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("animate-in"); });
      }, { threshold: 0.1 });
      document.querySelectorAll(".why-card,.product-card,.step-card,.faq-item").forEach(el => observer.observe(el));
      window.addEventListener("scroll", () => header.classList.toggle("scrolled", window.scrollY > 20), { passive: true });
    }

    // ============================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================
    document.addEventListener("DOMContentLoaded", () => {
      // Восстанавливаем путь после редиректа через 404.html (GitHub Pages хак)
      const redirect = sessionStorage.getItem('spa_redirect');
      if (redirect && redirect !== '/') {
        sessionStorage.removeItem('spa_redirect');
        window.history.replaceState({}, '', redirect);
      }
      renderNav();
      document.getElementById("mobileMenuBtn").addEventListener("click", toggleMobileMenu);
      document.addEventListener("keydown", e => {
        if (e.key === "Escape") { document.getElementById("mobileNav").classList.remove("active"); document.getElementById("mobileMenuBtn").textContent = "☰"; document.getElementById("mobileMenuBtn").textContent = "☰"; }
      });
      window.addEventListener("popstate", () => {
        router.render();
      });
      router.render();
    });
  </script>
</body>
</html>
